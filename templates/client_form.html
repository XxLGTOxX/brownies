{% extends "base.html" %}
{% block title %}{{ "Editar" if client else "Nuevo" }} Cliente — Brownies{% endblock %}

{% block content %}
<div class="space-y-4">
    <div class="flex items-center gap-3">
        <a href="/clientes"
            class="w-8 h-8 rounded-lg bg-chocolate-800/50 flex items-center justify-center text-chocolate-400 hover:text-chocolate-200 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </a>
        <h2 class="text-xl font-bold text-chocolate-100">{{ "Editar" if client else "Nuevo" }} Cliente</h2>
    </div>

    {% if error %}
    <div
        class="bg-red-500/10 border border-red-500/30 text-red-300 px-4 py-3 rounded-xl text-sm flex items-center gap-2">
        <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd"
                d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                clip-rule="evenodd" />
        </svg>
        {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ '/clientes/' + client.id if client else '/clientes' }}"
        class="glass rounded-2xl p-5 space-y-4 card-glow" id="clientForm">
        <div>
            <label class="label">Nombre del cliente</label>
            <input type="text" name="name" required value="{{ client.name if client else '' }}"
                class="input-field"
                placeholder="Ej: Cafetería El Sol">
        </div>

        <div class="flex items-center gap-6">
            <label class="inline-flex items-center">
                <input type="checkbox" id="sellIndividual" name="sells_individual" value="1"
                    {% if client and client.sells_individual %}checked{% endif %}>
                <span class="ml-2 text-chocolate-200 text-sm">Vende individuales</span>
            </label>
            <label class="inline-flex items-center">
                <input type="checkbox" id="sellCharola" name="sells_charola" value="1"
                    {% if client and client.sells_charola %}checked{% endif %}>
                <span class="ml-2 text-chocolate-200 text-sm">Vende charolas</span>
            </label>
        </div>

        <div class="grid grid-cols-2 gap-3" id="priceFields">
            <div id="individualPriceGroup">
                <label class="label">Precio Individual</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-stone-500 text-sm">$</span>
                    <input type="number" step="0.01" name="price_individual"
                        value="{{ client.price_individual if client else '' }}"
                        class="input-field pl-7"
                        placeholder="0.00">
                </div>
            </div>
            <div id="charolaPriceGroup">
                <label class="label">Precio Charola</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-stone-500 text-sm">$</span>
                    <input type="number" step="0.01" name="price_charola"
                        value="{{ client.price_charola if client else '' }}"
                        class="input-field pl-7"
                        placeholder="0.00">
                </div>
            </div>
        </div>

        <button type="submit" class="btn-primary w-full py-3 rounded-xl font-semibold text-white text-base">
            {{ "Guardar Cambios" if client else "Crear Cliente" }}
        </button>
    </form>

    <script>
        const sellIndividual = document.getElementById('sellIndividual');
        const sellCharola = document.getElementById('sellCharola');
        const individualGroup = document.getElementById('individualPriceGroup');
        const charolaGroup = document.getElementById('charolaPriceGroup');

        function updatePriceFields() {
            individualGroup.style.display = sellIndividual.checked ? 'block' : 'none';
            charolaGroup.style.display = sellCharola.checked ? 'block' : 'none';
            individualGroup.querySelector('input').required = sellIndividual.checked;
            charolaGroup.querySelector('input').required = sellCharola.checked;
        }

        sellIndividual.addEventListener('change', updatePriceFields);
        sellCharola.addEventListener('change', updatePriceFields);
        document.addEventListener('DOMContentLoaded', updatePriceFields);
    </script>
</div>
{% endblock %}
