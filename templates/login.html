<!DOCTYPE html>
<html lang="es" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Brownies Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .glass-card:hover {
            border-color: rgba(59, 130, 246, 0.3);
            box-shadow: 0 8px 40px rgba(59, 130, 246, 0.1);
        }

        .input-field {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.25);
            border-radius: 12px;
            padding: 12px 16px;
            color: #f1f5f9;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .input-field::placeholder {
            color: #94a3b8;
        }

        .input-field:focus {
            border-color: #3b82f6;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15), inset 0 0 0 1px rgba(59, 130, 246, 0.1);
        }

        .input-field:hover:not(:focus) {
            border-color: rgba(148, 163, 184, 0.35);
        }

        .label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .btn-submit:hover {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            box-shadow: 0 6px 25px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        .btn-submit:active {
            transform: translateY(0);
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.3);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                transform: translateY(-12px) rotate(8deg);
            }
        }

        .float-anim {
            animation: float 4s ease-in-out infinite;
            filter: drop-shadow(0 8px 16px rgba(59, 130, 246, 0.2));
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up {
            animation: fadeUp 0.6s ease-out forwards;
        }

        .fade-up-delay {
            animation: fadeUp 0.6s ease-out 0.2s forwards;
            opacity: 0;
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(59, 130, 246, 0.4), 0 0 40px rgba(59, 130, 246, 0.2);
            }
            50% {
                box-shadow: 0 0 30px rgba(59, 130, 246, 0.6), 0 0 60px rgba(59, 130, 246, 0.3);
            }
        }

        .glow-circle {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        .error-box {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            color: #fca5a5;
        }
    </style>
</head>

<body class="h-full bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 flex items-center justify-center p-4 overflow-hidden">
    <!-- Animated Background Elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <!-- Top left glow -->
        <div class="absolute -top-20 -left-40 w-80 h-80 bg-blue-500/15 rounded-full blur-[120px] glow-circle"></div>
        <!-- Center glow -->
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-blue-600/10 rounded-full blur-[140px]"></div>
        <!-- Bottom right glow -->
        <div class="absolute -bottom-20 -right-40 w-80 h-80 bg-indigo-500/10 rounded-full blur-[120px] glow-circle"></div>
    </div>

    <!-- Login Container -->
    <div class="w-full max-w-sm relative z-10">
        <!-- Logo/Brand Section -->
        <div class="text-center mb-10 fade-up">
            <div class="inline-block mb-4 p-4 rounded-2xl bg-gradient-to-br from-blue-500/20 to-indigo-600/20 border border-blue-400/30">
                <div class="text-5xl float-anim">🍫</div>
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight mb-2">
                <span class="bg-gradient-to-r from-blue-300 via-blue-400 to-blue-500 bg-clip-text text-transparent">
                    Brownies Manager
                </span>
            </h1>
            <p class="text-slate-400 text-sm font-medium">Sistema de gestión de ventas</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-2xl p-8 fade-up-delay">
            <!-- Error Message -->
            {% if error %}
            <div class="error-box px-4 py-3 rounded-lg text-sm mb-6 flex items-start gap-3">
                <svg class="w-5 h-5 shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                        clip-rule="evenodd" />
                </svg>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <!-- Login Form -->
            <form method="POST" action="/login" class="space-y-6">
                <!-- Username Field -->
                <div>
                    <label class="label" for="username">Usuario</label>
                    <div class="relative">
                        <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                        <input type="text" id="username" name="username" required autocomplete="username"
                            class="input-field pl-12"
                            placeholder="tu_usuario">
                    </div>
                </div>

                <!-- Password Field -->
                <div>
                    <label class="label" for="password">Contraseña</label>
                    <div class="relative">
                        <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                        <input type="password" id="password" name="password" required autocomplete="current-password"
                            class="input-field pl-12"
                            placeholder="••••••••">
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit mt-8">
                    Iniciar Sesión
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-6">
                <div class="flex-1 h-px bg-gradient-to-r from-slate-700 to-transparent"></div>
                <span class="text-xs text-slate-500 font-medium">Brownies & Sales</span>
                <div class="flex-1 h-px bg-gradient-to-l from-slate-700 to-transparent"></div>
            </div>

            <!-- Info Text -->
            <p class="text-center text-xs text-slate-400">
                Ingresa tus credenciales para acceder al sistema
            </p>
        </div>

        <!-- Footer -->
        <p class="text-center text-slate-600 text-xs mt-8 font-medium">
            Nahomy & Gera © 2026 | Brownies Manager
        </p>
    </div>
</body>

</html>
