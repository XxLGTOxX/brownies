<!DOCTYPE html>
<html lang="es" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Brownies Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(59, 130, 246, 0.15);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(0deg);
            }
            50% {
                transform: translateY(-10px) rotate(5deg);
            }
        }

        .float-anim {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-up {
            animation: fadeUp 0.6s ease-out forwards;
        }

        .fade-up-delay {
            animation: fadeUp 0.6s ease-out 0.2s forwards;
            opacity: 0;
        }
    </style>
</head>

<body class="h-full bg-slate-950 flex items-center justify-center p-4">
    <!-- Background glow -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-96 h-96 bg-blue-500/10 rounded-full blur-[100px]">
        </div>
        <div class="absolute bottom-0 left-0 w-64 h-64 bg-blue-500/5 rounded-full blur-[80px]"></div>
    </div>

    <div class="w-full max-w-sm relative z-10">
        <!-- Logo/Brand -->
        <div class="text-center mb-8 fade-up">
            <div class="text-6xl mb-3 float-anim inline-block">🍫</div>
            <h1 class="text-3xl font-extrabold bg-gradient-to-r from-blue-200 to-blue-400 bg-clip-text text-transparent">
                Brownies Manager
            </h1>
            <p class="text-slate-400 text-sm mt-1">Gestión de ventas</p>
        </div>

        <!-- Login Card -->
        <div class="glass-card rounded-2xl p-6 fade-up-delay">
            {% if error %}
            <div
                class="bg-red-500/10 border border-red-500/30 text-red-300 px-4 py-3 rounded-xl text-sm mb-4 flex items-center gap-2">
                <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
                        clip-rule="evenodd" />
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login" class="space-y-4">
                <div>
                    <label class="label">Usuario</label>
                    <input type="text" name="username" required autocomplete="username"
                        class="input-field"
                        placeholder="Ingresa tu usuario">
                </div>
                <div>
                    <label class="label">Contraseña</label>
                    <input type="password" name="password" required autocomplete="current-password"
                        class="input-field"
                        placeholder="••••••••">
                </div>
                <button type="submit" class="btn-brand w-full py-2 px-4 rounded-lg font-medium text-sm">
                    Iniciar Sesión
                </button>
            </form>
        </div>

        <p class="text-center text-slate-500 text-xs mt-6">
            Nahomy & Gera © 2026
        </p>
    </div>
</body>

</html>
