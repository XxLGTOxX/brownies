{% extends "base.html" %}
{% block title %}Nuevo Gasto — Brownies{% endblock %}

{% block content %}
<div class="space-y-4">
    <div class="flex items-center gap-3">
        <a href="/gastos"
            class="w-8 h-8 rounded-lg bg-stone-800/50 flex items-center justify-center text-stone-400 hover:text-stone-200 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </a>
        <h2 class="text-xl font-bold text-stone-100">Nuevo Gasto</h2>
    </div>

    <form method="POST" action="/gastos" class="glass rounded-2xl p-5 space-y-4 card-glow">
        <div>
            <label class="label">Descripción</label>
            <input type="text" name="description" required
                class="input-field"
                placeholder="Ej: 2 bolsas de harina, chocolate, etc.">
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="label">Monto</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-stone-500 text-sm">$</span>
                    <input type="number" step="0.01" name="amount" required
                        class="input-field pl-7"
                        placeholder="0.00">
                </div>
            </div>
            <div>
                <label class="label">Fecha</label>
                <input type="date" name="date" required
                    class="input-field">
            </div>
        </div>

        <button type="submit" class="btn-brand w-full py-2 px-4 rounded-lg font-medium text-sm">
            Registrar Gasto
        </button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Set today's date as default
    const dateInput = document.querySelector('input[type="date"]');
    dateInput.value = new Date().toISOString().split('T')[0];
</script>
{% endblock %}
