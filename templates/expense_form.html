{% extends "base.html" %}
{% block title %}Nuevo Gasto — Brownies{% endblock %}

{% block content %}
<div class="space-y-4">
    <div class="flex items-center gap-3">
        <a href="/gastos"
            class="w-8 h-8 rounded-lg bg-chocolate-800/50 flex items-center justify-center text-chocolate-400 hover:text-chocolate-200 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </a>
        <h2 class="text-xl font-bold text-chocolate-100">Nuevo Gasto</h2>
    </div>

    <form method="POST" action="/gastos" class="glass rounded-2xl p-5 space-y-4 card-glow">
        <div>
            <label class="block text-chocolate-300 text-sm font-medium mb-1.5">Descripción</label>
            <input type="text" name="description" required
                class="w-full bg-chocolate-900/50 border border-chocolate-700/50 rounded-xl px-4 py-3 text-chocolate-100 placeholder-chocolate-600 focus:outline-none text-sm"
                placeholder="Ej: 2 bolsas de harina, chocolate, etc.">
        </div>
        <div class="grid grid-cols-2 gap-3">
            <div>
                <label class="block text-chocolate-300 text-sm font-medium mb-1.5">Monto</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-chocolate-500 text-sm">$</span>
                    <input type="number" step="0.01" name="amount" required
                        class="w-full bg-chocolate-900/50 border border-chocolate-700/50 rounded-xl pl-7 pr-4 py-3 text-chocolate-100 placeholder-chocolate-600 focus:outline-none text-sm"
                        placeholder="0.00">
                </div>
            </div>
            <div>
                <label class="block text-chocolate-300 text-sm font-medium mb-1.5">Fecha</label>
                <input type="date" name="date" required
                    class="w-full bg-chocolate-900/50 border border-chocolate-700/50 rounded-xl px-4 py-3 text-chocolate-100 focus:outline-none text-sm">
            </div>
        </div>

        <button type="submit" class="btn-primary w-full py-3 rounded-xl font-semibold text-white text-sm">
            Registrar Gasto
        </button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Set today's date as default
    const dateInput = document.querySelector('input[type="date"]');
    dateInput.value = new Date().toISOString().split('T')[0];
</script>
{% endblock %}
